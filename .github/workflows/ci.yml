name: CI

# Gate every push and PR to main on lint + typecheck + tests. These steps need
# no secrets — the unit suite covers pure logic and the typecheck/lint are static.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
